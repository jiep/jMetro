name: CI

on:
  push:
    branches:
      - master
    tags:
      - v*
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      
    steps:
    - name: Install Maven
      run: sudo mkdir -p /usr/share/man/man1/ && sudo apt update && sudo apt install -y maven python3

    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - name: Set up JDK 8
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        distribution: 'zulu'
        java-version: '8'
    - name: Build with Maven
      run: mvn clean compile resources:resources assembly:single

    - name: Move jar to root
      if: startsWith(github.ref, 'refs/tags/v')
      run: mv target/jMetro-*-jar-with-dependencies.jar .

    - name: Set release
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        chmod +x ./.github/extract_version
        VERSION=`./.github/extract_version`
        TAG_VERSION="${GITHUB_REF_NAME#v}"

        if [ "$VERSION" != "$TAG_VERSION" ]; then
          echo "Tag version ($TAG_VERSION) does not match artifact version ($VERSION)."
          exit 1
        fi

        gh release create "${GITHUB_REF_NAME}" ./*.jar \
          --verify-tag \
          --title "${GITHUB_REF_NAME}" \
          --generate-notes
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Generate attestation
      if: startsWith(github.ref, 'refs/tags/v')
      uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
      with:
        subject-path: "jMetro-*.jar"
